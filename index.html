<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>濱</title>
    <link rel="stylesheet" href="./styles.css?v=5" />
  </head>
  <body>
    <main class="screen">
      <svg
        class="mark"
        viewBox="0 0 100 100"
        role="img"
        aria-label="濱"
      >
        <circle class="ring" cx="50" cy="50" r="46" />
        <text class="kanji" x="50" y="50" dominant-baseline="central" text-anchor="middle">
          濱
        </text>
      </svg>
      <button class="viewer-button" type="button" aria-controls="viewer">
        NEXT
      </button>
    </main>
    <div class="viewer" id="viewer" aria-hidden="true">
      <button class="viewer-close" type="button" aria-label="前へ戻る">PREV</button>
      <img class="viewer-image" src="./manbiki.png" alt="manbiki" />
      <svg
        class="viewer-pulse"
        viewBox="0 0 100 100"
        preserveAspectRatio="xMidYMid slice"
        aria-hidden="true"
      >
        <defs>
          <mask id="pulse-mask">
            <rect width="100" height="100" fill="white"></rect>
            <g class="pulse-zoom pulse-zoom--a">
              <circle class="pulse-hole" cx="50" cy="50" r="19"></circle>
            </g>
            <g class="pulse-zoom pulse-zoom--b">
              <circle class="pulse-hole" cx="50" cy="50" r="19"></circle>
            </g>
          </mask>
        </defs>
        <rect class="pulse-overlay" width="100" height="100" mask="url(#pulse-mask)"></rect>
        <g class="pulse-zoom pulse-zoom--a">
          <circle class="pulse-border" cx="50" cy="50" r="19"></circle>
        </g>
        <g class="pulse-zoom pulse-zoom--b">
          <circle class="pulse-border" cx="50" cy="50" r="19"></circle>
        </g>
      </svg>
    </div>
    <script>
      const viewer = document.getElementById("viewer");
      const openButton = document.querySelector(".viewer-button");
      const closeButton = document.querySelector(".viewer-close");

      const closeViewer = () => {
        viewer.classList.remove("is-open");
        viewer.setAttribute("aria-hidden", "true");
      };

      openButton.addEventListener("click", () => {
        viewer.classList.add("is-open");
        viewer.setAttribute("aria-hidden", "false");
      });

      closeButton.addEventListener("click", closeViewer);

      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) {
          closeViewer();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeViewer();
        }
      });
    </script>
  </body>
</html>
